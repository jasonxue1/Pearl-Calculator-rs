name: Build

on:
  push:

permissions:
  contents: write
  actions: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ matrix.target }}
          cache-on-failure: true
      - name: Build (${{ matrix.target }})
        run: cargo build -rp pearl-calculator --target ${{ matrix.target }}
      - name: Upload artifact (${{ matrix.target }})
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: pearl-calculator-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/pearl-calculator
      - name: Upload artifact (${{ matrix.target }}) [Windows]
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: pearl-calculator-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/pearl-calculator.exe

  build-gui-packages:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            kind: linux
            formats: [deb, appimage, pacman]
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            kind: linux
            formats: [deb, appimage, pacman]
          - target: x86_64-apple-darwin
            os: macos-latest
            kind: macos
            formats: [app]
            arch: x64
          - target: aarch64-apple-darwin
            os: macos-latest
            kind: macos
            formats: [app]
            arch: arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            kind: windows
            formats: [nsis]
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            kind: windows
            formats: [nsis]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: gui-${{ matrix.target }}
          cache-on-failure: true
      - name: Install cargo-packager
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-packager
      - name: Build GUI
        run: cargo build -rp pearl-calculator-gui --target ${{ matrix.target }}
      - name: Package GUI
        run: >-
          cargo packager
          -p pearl-calculator-gui
          -r
          --target ${{ matrix.target }}
          -f ${{ join(matrix.formats, ',') }}
      - name: Generate dmg for macOS
        if: matrix.kind == 'macos'
        run: |
          brew install create-dmg
          chmod +x .github/workflows/scripts/generate-dmg.sh
          .github/workflows/scripts/generate-dmg.sh "${{ matrix.arch }}"
          rm -rf dist/Pearl\ Calculator.app
      - name: Upload GUI artifact
        uses: actions/upload-artifact@v6
        with:
          name: pearl-calculator-gui-${{ matrix.target }}
          path: |
            dist/*
            !dist/PKGBUILD

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build-gui-packages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: pearl-calculator-*
          path: dist
      - name: Package CLI Archives (all targets)
        run: |
          set -euo pipefail
          mkdir -p release-assets
          for dir in dist/pearl-calculator-*; do
            [ -d "$dir" ] || continue
            artifact_name="$(basename "$dir")"
            archive_base="${artifact_name}-${GITHUB_REF_NAME}"
            if [ -f "$dir/pearl-calculator.exe" ]; then
              (cd "$dir" && zip -q "../../release-assets/${archive_base}.zip" pearl-calculator.exe)
            elif [ -f "$dir/pearl-calculator" ]; then
              chmod +x "$dir/pearl-calculator"
              (cd "$dir" && tar -czf "../../release-assets/${archive_base}.tar.gz" pearl-calculator)
            fi
          done
      - name: Generate release body
        run: |
          set -euo pipefail
          python3 .github/workflows/scripts/summary.py \
            release-body \
            --dist-root dist \
            --output release-assets/release-body.md
      - name: Create GitHub Release and upload assets
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          name: Pearl-Calculator ${{ github.ref_name }}
          body_path: release-assets/release-body.md
          files: |
            release-assets/pearl-calculator-*.zip
            release-assets/pearl-calculator-*.tar.gz
            dist/pearl-calculator-gui-*/*

  build-summary:
    if: always()
    needs: [build, build-gui-packages]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Generate artifact summary table
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 .github/workflows/scripts/summary.py \
            build-summary \
            --output "$GITHUB_STEP_SUMMARY"
