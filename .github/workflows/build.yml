name: Build

on:
  push:

permissions:
  contents: write
  actions: read

env:
  CARGO_NET_RETRY: 10
  CARGO_HTTP_TIMEOUT: 120
  RUSTUP_MAX_RETRIES: 10

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ matrix.target }}
          cache-on-failure: true
      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            if sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu; then
              exit 0
            fi
            echo "apt attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "apt install failed after 3 attempts"
          exit 1
      - name: Build (${{ matrix.target }})
        run: cargo build --release -p pearl-calculator --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Upload artifact (${{ matrix.target }})
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: pearl-calculator-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/pearl-calculator
      - name: Upload artifact (${{ matrix.target }}) [Windows]
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: pearl-calculator-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/pearl-calculator.exe

  build-gui-packages:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            kind: linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            kind: linux
          - target: x86_64-apple-darwin
            os: macos-latest
            kind: macos
          - target: aarch64-apple-darwin
            os: macos-latest
            kind: macos
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            kind: windows
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            kind: windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: gui-${{ matrix.target }}
          cache-on-failure: true
      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            if sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu; then
              exit 0
            fi
            echo "apt attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "apt install failed after 3 attempts"
          exit 1
      - name: Install Linux GUI packaging dependencies
        if: matrix.kind == 'linux'
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            if sudo apt-get update && sudo apt-get install -y \
              libgtk-3-dev \
              libxdo-dev \
              libxkbcommon-dev \
              libwayland-dev \
              libasound2-dev; then
              exit 0
            fi
            echo "apt attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "apt install failed after 3 attempts"
          exit 1
      - name: Install cargo-bundle
        if: matrix.kind != 'windows'
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            if cargo install cargo-bundle --locked; then
              exit 0
            fi
            echo "cargo-bundle install attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "cargo-bundle install failed after 3 attempts"
          exit 1
      - name: Build GUI EXE (Windows)
        if: matrix.kind == 'windows'
        run: cargo build --release -p pearl-calculator-gui --target ${{ matrix.target }}
      - name: Rename GUI EXE (Windows)
        if: matrix.kind == 'windows'
        run: Rename-Item -Path "target/${{ matrix.target }}/release/pearl-calculator-gui.exe" -NewName "Pearl Calculator.exe"
      - name: Build GUI DEB (Linux)
        if: matrix.kind == 'linux'
        run: |
          cargo bundle --release -p pearl-calculator-gui --target ${{ matrix.target }} --format deb
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Rename GUI DEB (Linux)
        if: matrix.kind == 'linux'
        run: |
          set -euo pipefail
          version="$(cargo pkgid -p pearl-calculator-gui | sed -E 's/.*@([0-9][^ ]*)$/\1/')"
          deb_dir="target/${{ matrix.target }}/release/bundle/deb"
          deb_path="$(ls "$deb_dir"/*.deb | head -n1)"
          mv "$deb_path" "$deb_dir/pearl-calculator-gui-${{ matrix.target }}-v${version}.deb"
      - name: Build GUI APP bundle (macOS)
        if: matrix.kind == 'macos'
        run: cargo bundle --release -p pearl-calculator-gui --target ${{ matrix.target }} --format osx
      - name: Upload GUI EXE artifact
        if: matrix.kind == 'windows'
        uses: actions/upload-artifact@v6
        with:
          name: pearl-calculator-gui-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/Pearl Calculator.exe
      - name: Upload GUI DEB artifact
        if: matrix.kind == 'linux'
        uses: actions/upload-artifact@v6
        with:
          name: pearl-calculator-gui-deb-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/bundle/deb/pearl-calculator-gui-${{ matrix.target }}-v*.deb
      - name: Upload GUI APP artifact
        if: matrix.kind == 'macos'
        uses: actions/upload-artifact@v6
        with:
          name: pearl-calculator-gui-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/bundle/osx/*.app

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build-gui-packages]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: pearl-calculator-*
          path: dist
      - name: Package CLI Archives (all targets)
        run: |
          set -euo pipefail
          mkdir -p release-assets
          for dir in dist/pearl-calculator-*; do
            [ -d "$dir" ] || continue
            artifact_name="$(basename "$dir")"
            archive_base="${artifact_name}-${GITHUB_REF_NAME}"
            if [ -f "$dir/pearl-calculator.exe" ]; then
              (cd "$dir" && zip -q "../../release-assets/${archive_base}.zip" pearl-calculator.exe)
            elif [ -f "$dir/pearl-calculator" ]; then
              (cd "$dir" && tar -czf "../../release-assets/${archive_base}.tar.gz" pearl-calculator)
            fi
          done
      - name: Package GUI EXE (zip)
        run: |
          set -euo pipefail
          mkdir -p release-assets
          for dir in dist/pearl-calculator-gui-*-pc-windows-msvc; do
            [ -d "$dir" ] || continue
            artifact_name="$(basename "$dir")"
            (cd "$dir" && zip -q "../../release-assets/${artifact_name}-${GITHUB_REF_NAME}.zip" "Pearl Calculator.exe")
          done
      - name: Package GUI APP (.tar.gz)
        run: |
          set -euo pipefail
          mkdir -p release-assets
          for dir in dist/pearl-calculator-gui-*-apple-darwin; do
            [ -d "$dir" ] || continue
            artifact_name="$(basename "$dir")"
            app_path="$(find "$dir" -maxdepth 1 -name '*.app' -type d | head -n1)"
            [ -n "$app_path" ] || continue
            app_name="$(basename "$app_path")"
            if [ -d "$app_path/Contents/MacOS" ]; then
              chmod +x "$app_path"/Contents/MacOS/* || true
            fi
            (cd "$dir" && tar -czf "../../release-assets/${artifact_name}-${GITHUB_REF_NAME}.tar.gz" "$app_name")
          done
      - name: Package GUI DEB (.tar.gz)
        run: |
          set -euo pipefail
          mkdir -p release-assets
          for dir in dist/pearl-calculator-gui-deb-*; do
            [ -d "$dir" ] || continue
            artifact_name="$(basename "$dir")"
            deb_path="$(find "$dir" -maxdepth 1 -name '*.deb' -type f | head -n1)"
            [ -n "$deb_path" ] || continue
            deb_name="$(basename "$deb_path")"
            (cd "$dir" && tar -czf "../../release-assets/${artifact_name}-${GITHUB_REF_NAME}.tar.gz" "$deb_name")
          done
      - name: Generate release body
        run: |
          set -euo pipefail
          cat > release-assets/release-body.md <<EOF
          ## Downloads

          | OS | Arch | CLI | GUI |
          | --- | --- | --- | --- |
          | Windows | x86_64 | [CLI](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/pearl-calculator-x86_64-pc-windows-msvc-${GITHUB_REF_NAME}.zip) | [GUI](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/pearl-calculator-gui-x86_64-pc-windows-msvc-${GITHUB_REF_NAME}.zip) |
          | Windows | aarch64 | [CLI](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/pearl-calculator-aarch64-pc-windows-msvc-${GITHUB_REF_NAME}.zip) | [GUI](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/pearl-calculator-gui-aarch64-pc-windows-msvc-${GITHUB_REF_NAME}.zip) |
          | Linux | x86_64 | [CLI](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/pearl-calculator-x86_64-unknown-linux-gnu-${GITHUB_REF_NAME}.tar.gz) | [GUI-deb](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/pearl-calculator-gui-deb-x86_64-unknown-linux-gnu-${GITHUB_REF_NAME}.tar.gz) |
          | Linux | aarch64 | [CLI](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/pearl-calculator-aarch64-unknown-linux-gnu-${GITHUB_REF_NAME}.tar.gz) | [GUI-deb](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/pearl-calculator-gui-deb-aarch64-unknown-linux-gnu-${GITHUB_REF_NAME}.tar.gz) |
          | macOS | x86_64 | [CLI](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/pearl-calculator-x86_64-apple-darwin-${GITHUB_REF_NAME}.tar.gz) | [GUI](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/pearl-calculator-gui-x86_64-apple-darwin-${GITHUB_REF_NAME}.tar.gz) |
          | macOS | aarch64 | [CLI](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/pearl-calculator-aarch64-apple-darwin-${GITHUB_REF_NAME}.tar.gz) | [GUI](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/pearl-calculator-gui-aarch64-apple-darwin-${GITHUB_REF_NAME}.tar.gz) |
          EOF
      - name: Create GitHub Release and upload assets
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          name: Pearl-Calculator ${{ github.ref_name }}
          body_path: release-assets/release-body.md
          files: |
            release-assets/pearl-calculator-*.zip
            release-assets/pearl-calculator-*.tar.gz
            release-assets/pearl-calculator-gui-*-pc-windows-msvc-*.zip
            release-assets/pearl-calculator-gui-*-apple-darwin-*.tar.gz
            release-assets/pearl-calculator-gui-deb-*.tar.gz

  build-summary:
    if: always()
    needs: [build, build-gui-packages]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Generate artifact summary table
        uses: actions/github-script@v8
        with:
          script: |
            const runId = context.runId;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner,
              repo,
              run_id: runId,
              per_page: 100,
            });

            const targetArtifacts = artifacts.filter(
              (a) => !a.expired && a.name.startsWith("pearl-calculator")
            );
            const runArtifactsUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${runId}/artifacts`;

            function parseTypeAndTarget(name) {
              if (name.startsWith("pearl-calculator-gui-deb-")) {
                return { type: "gui-deb", target: name.replace("pearl-calculator-gui-deb-", "") };
              }
              if (name.startsWith("pearl-calculator-gui-")) {
                return { type: "gui", target: name.replace("pearl-calculator-gui-", "") };
              }
              if (name.startsWith("pearl-calculator-")) {
                return { type: "cli", target: name.replace("pearl-calculator-", "") };
              }
              return null;
            }

            function parseOsArch(target) {
              const arch = target.split("-")[0] || target;
              let os = "other";
              if (target.includes("windows")) os = "Windows";
              else if (target.includes("linux")) os = "Linux";
              else if (target.includes("apple-darwin")) os = "macOS";
              return { os, arch };
            }

            const rows = new Map();
            for (const artifact of targetArtifacts) {
              const parsed = parseTypeAndTarget(artifact.name);
              if (!parsed) continue;
              const { os, arch } = parseOsArch(parsed.target);
              const key = `${os}|${arch}`;
              if (!rows.has(key)) rows.set(key, { os, arch, cli: "-", gui: "-" });
              const row = rows.get(key);
              const artifactUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${runId}/artifacts/${artifact.id}`;
              if (parsed.type === "cli") row.cli = `[CLI](${artifactUrl})`;
              if (parsed.type === "gui") row.gui = `[GUI](${artifactUrl})`;
              if (parsed.type === "gui-deb") row.gui = `[GUI-deb](${artifactUrl})`;
            }

            const osOrder = { Windows: 1, Linux: 2, macOS: 3, other: 4 };
            const archOrder = { x86_64: 1, aarch64: 2 };
            const sortedRows = Array.from(rows.values()).sort((a, b) => {
              const osCmp = (osOrder[a.os] || 99) - (osOrder[b.os] || 99);
              if (osCmp !== 0) return osCmp;
              const archCmp = (archOrder[a.arch] || 99) - (archOrder[b.arch] || 99);
              if (archCmp !== 0) return archCmp;
              return a.arch.localeCompare(b.arch);
            });

            let table = "";
            if (sortedRows.length === 0) {
              table = "No artifacts found for this run.";
            } else {
              table += "| OS | Arch | CLI | GUI |\n";
              table += "| --- | --- | --- | --- |\n";
              for (const row of sortedRows) {
                table += `| ${row.os} | ${row.arch} | ${row.cli} | ${row.gui} |\n`;
              }
            }

            await core.summary
              .addRaw("## Build Artifacts Summary\n\n", true)
              .addRaw(table, true)
              .write();
